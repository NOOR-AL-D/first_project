name: DevOps CI

on:
  push:
    branches:
      - main

jobs:
  test-run:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests

      - name: Run list command
        run: python main.py list

      - name: Run API check
        run: python main.py api https://api.github.com